policies:
  - name: strict_citations
    description: Default strict policy with citation enforcement.
    generation:
      reasoning_level: limited
      allow_external_knowledge: false
      require_citations: true
      fallback: strict
      temperature: 0.0
    logging:
      level: full
    enforcement:
      validate_citations: true
      block_on_missing_citations: true
      enforce_strict_fallback: true
      prevent_external_knowledge: true
      max_output_tokens: 512
    document_policy:
      top_k: 10
      filter_name: enterprise_only

  - name: soft_research
    description: Relaxed fallback policy for exploratory answers.
    generation:
      reasoning_level: full
      allow_external_knowledge: false
      require_citations: true
      fallback: soft
      temperature: 0.1
    logging:
      level: full
    enforcement:
      validate_citations: true
      block_on_missing_citations: false
      enforce_strict_fallback: false
      prevent_external_knowledge: true
      max_output_tokens: 1024
    document_policy:
      top_k: 15
      filter_name: pii_sensitive

filters:
  - name: enterprise_only
    description: Only apply to enterprise tier organizations.
    condition:
      field: org_tier
      operator: equals
      value: enterprise
      source: user

  - name: pii_sensitive
    description: Filter for teams handling regulated data classes.
    condition:
      field: data_classification
      operator: intersects
      value:
        - pii
        - phi
      source: user

  - name: finance_high_assurance
    description: Finance use cases with high assurance guardrails.
    and:
      - condition:
          field: department
          operator: equals
          value: finance
          source: user
      - or:
          - condition:
              field: data_classification
              operator: intersects
              value:
                - confidential
                - restricted
              source: user
          - condition:
              field: region
              operator: in
              value:
                - us
                - eu
              source: user
      - condition:
          field: user_clearance_level
          operator: gte
          value: 3
          source: user

  - name: production_write_guard
    description: Extra checks before allowing production write operations.
    and:
      - condition:
          field: environment
          operator: equals
          value: production
          source: user
      - condition:
          field: action
          operator: in
          value:
            - write
            - delete
          source: user
      - condition:
          field: risk_score
          operator: lte
          value: 70
          source: user


orgs:
  - org_id: acme_corp
    description: Acme Corporation with strict citation requirements.
    default_policy: strict_citations
    policy_rules:
      - name: allow_enterprise_strict
        description: Allow enterprise traffic under the strict citations policy.
        priority: 50
        effect: deny
        when:
          all:
            - field: org_tier
              operator: equals
              value: enterprise
              source: user

      - name: allow_finance_department_nested
        description: Allow when user department is provided as a nested user path.
        priority: 35
        effect: allow
        apply_policy: strict_citations
        when:
          any:
            - field: attributes.department
              operator: equals
              value: finance
              source: user

    deny_rules:
      - name: deny_untrusted_document_source
        description: Deny if any retrieved document comes from an untrusted source.
        priority: 60
        when:
          any:
            - field: metadata.source
              operator: equals
              value: public-web
              source: documents
              document_match: any

      - name: deny_low_confidence_docs
        description: Deny responses when all retrieval documents have low confidence.
        priority: 10
        when:
          all:
            - field: score
              operator: lte
              value: 0.4
              source: documents
              document_match: all

      - name: deny_untrusted_and_low_confidence
        description: Deny if any doc is from untrusted source with low confidence score.
        priority: 55
        when:
          any:
            - and:
                - condition:
                    field: metadata.source
                    operator: in
                    value:
                      - public-web
                      - external-forum
                    source: documents
                - condition:
                    field: score
                    operator: lt
                    value: 0.5
                    source: documents
              document_match: any

      - name: deny_restricted_classification
        description: Deny when docs contain restricted or confidential classification.
        priority: 50
        when:
          any:
            - field: metadata.classification
              operator: intersects
              value:
                - restricted
                - confidential
                - internal-only
              source: documents
              document_match: any

      - name: deny_outdated_documents
        description: Deny when documents are older than 365 days.
        priority: 40
        when:
          all:
            - field: metadata.days_old
              operator: gt
              value: 365
              source: documents
              document_match: all

      - name: deny_external_users_restricted_docs
        description: Deny external users from accessing restricted documents.
        priority: 48
        when:
          all:
            - field: user_type
              operator: equals
              value: external
              source: user
            - field: metadata.classification
              operator: equals
              value: restricted
              source: documents
              document_match: any

  - org_id: beta_labs
    description: Beta Labs with flexible research policies.
    default_policy: soft_research
    policy_rules:
      - name: allow_analyst_research
        description: Allow analyst research workflows using soft fallback.
        priority: 21
        effect: allow
        apply_policy: soft_research
        when:
          all:
            - field: user_role
              operator: equals
              value: analyst
              source: user

    deny_rules:
      - name: deny_untrusted_docs_any
        description: Deny when any retrieved doc comes from untrusted source.
        priority: 30
        when:
          any:
            - field: metadata.source
              operator: equals
              value: unknown
              source: documents
              document_match: any

      - name: deny_all_docs_restricted
        description: Deny when all retrieved docs are marked as restricted.
        priority: 22
        when:
          all:
            - field: metadata.classification
              operator: equals
              value: restricted
              source: documents
              document_match: all

      - name: deny_pii_classified_documents
        description: Deny when any document is classified as containing PII or PHI.
        priority: 45
        when:
          any:
            - field: metadata.data_classification
              operator: intersects
              value:
                - pii
                - phi
                - financial_records
              source: documents
              document_match: any

      - name: deny_low_quality_sources
        description: Deny when docs have low confidence or are from unreliable sources.
        priority: 28
        when:
          any:
            - or:
                - condition:
                    field: score
                    operator: lte
                    value: 0.3
                    source: documents
                - condition:
                    field: metadata.source
                    operator: equals
                    value: user-generated
                    source: documents
              document_match: any

      - name: deny_experimental_data
        description: Deny when documents are from experimental or pre-release datasets.
        priority: 15
        when:
          all:
            - field: metadata.data_maturity
              operator: equals
              value: experimental
              source: documents
            - field: metadata.approval_status
              operator: equals
              value: pending
              source: documents
              document_match: all

      - name: deny_junior_analysts_sensitive_docs
        description: Deny junior analysts from accessing PII or confidential documents.
        priority: 35
        when:
          all:
            - field: attributes.clearance_level
              operator: lt
              value: 3
              source: user
            - field: metadata.data_classification
              operator: intersects
              value:
                - pii
                - confidential
              source: documents
              document_match: any
